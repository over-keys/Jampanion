name: Build Windows release package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to update (leave empty for artifact only)
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      AVALONIA_TELEMETRY_OPTOUT: '1'

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = '0.6.0-dev'
          }
          else {
            $version = $version.Trim()
            if ($version.StartsWith('v')) {
              $version = $version.Substring(1)
            }
          }
          if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$') {
            throw "release_tag must be vMAJOR.MINOR.PATCH or a valid SemVer value: $version"
          }
          $numericVersion = ($version -split '[-+]')[0]
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FILE_VERSION=$numericVersion.0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare embedded FluidSynth assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $thirdParty = Join-Path $PWD 'third_party'
          $fluidSynthStage = Join-Path $thirdParty 'fluidsynth'
          $soundFontStage = Join-Path $thirdParty 'soundfonts'
          New-Item -ItemType Directory -Force -Path $fluidSynthStage, $soundFontStage | Out-Null

          gh release download v2.5.6 --repo FluidSynth/fluidsynth `
            --pattern 'fluidsynth-v2.5.6-win10-x64-cpp11.zip' `
            --dir $fluidSynthStage
          Expand-Archive -LiteralPath (Join-Path $fluidSynthStage 'fluidsynth-v2.5.6-win10-x64-cpp11.zip') `
            -DestinationPath $fluidSynthStage -Force

          $archive = Join-Path $soundFontStage 'fluid-soundfont_3.1.orig.tar.gz'
          curl.exe -L --fail --retry 3 `
            -o $archive `
            'https://deb.debian.org/debian/pool/main/f/fluid-soundfont/fluid-soundfont_3.1.orig.tar.gz'
          $extract = Join-Path $soundFontStage 'extract'
          New-Item -ItemType Directory -Force -Path $extract | Out-Null
          tar -xzf $archive -C $extract
          Copy-Item -LiteralPath (Join-Path $extract 'fluid-soundfont-3.1\FluidR3_GM.sf2') `
            -Destination (Join-Path $soundFontStage 'FluidR3_GM.sf2') -Force
          Remove-Item -LiteralPath $archive -Force
          Remove-Item -LiteralPath $extract -Recurse -Force

          dotnet run --project scripts/Sf2Subset/Sf2Subset.csproj -c Release `
            -p:RestoreIgnoreFailedSources=true -- `
            (Join-Path $soundFontStage 'FluidR3_GM.sf2') `
            (Join-Path $soundFontStage 'FluidR3_Jampanion.sf2')
          Remove-Item -LiteralPath (Join-Path $soundFontStage 'FluidR3_GM.sf2') -Force

          $sourceBin = Join-Path $fluidSynthStage 'fluidsynth-v2.5.6-win10-x64-cpp11\bin'
          Copy-Item -LiteralPath (Join-Path $sourceBin 'libfluidsynth-3.dll') -Destination (Join-Path $fluidSynthStage 'libfluidsynth-3.dll') -Force
          Copy-Item -LiteralPath (Join-Path $sourceBin 'sndfile.dll') -Destination (Join-Path $fluidSynthStage 'sndfile.dll') -Force
          Copy-Item -LiteralPath (Join-Path $sourceBin 'SDL3.dll') -Destination (Join-Path $fluidSynthStage 'SDL3.dll') -Force
          Get-Item (Join-Path $soundFontStage 'FluidR3_Jampanion.sf2'),
            (Join-Path $fluidSynthStage 'libfluidsynth-3.dll'),
            (Join-Path $fluidSynthStage 'sndfile.dll'),
            (Join-Path $fluidSynthStage 'SDL3.dll') | Select-Object FullName, Length

      - name: Restore
        shell: pwsh
        run: dotnet restore Jampanion.sln -r win-x64 -p:UsedAvaloniaProducts= -p:RestoreIgnoreFailedSources=true

      - name: Publish Windows x64
        shell: pwsh
        run: >-
          dotnet publish src/Jampanion/Jampanion.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:PublishReadyToRun=false
          -p:UsedAvaloniaProducts=
          -p:DebugSymbols=false
          -p:DebugType=None
          -p:IncludeSymbolsInSingleFile=false
          -p:Version=$env:PACKAGE_VERSION
          -p:AssemblyVersion=$env:FILE_VERSION
          -p:FileVersion=$env:FILE_VERSION
          -p:InformationalVersion=$env:PACKAGE_VERSION
          -o artifacts/Jampanion-win-x64

      - name: Validate published executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $publish = Join-Path $PWD 'artifacts/Jampanion-win-x64'
          $exe = Join-Path $publish 'Jampanion.exe'
          if (-not (Test-Path -LiteralPath $exe -PathType Leaf)) {
            throw "Published executable was not created: $exe"
          }
          $versionInfo = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exe)
          if ($versionInfo.FileVersion -ne $env:FILE_VERSION) {
            throw "Unexpected Windows file version: $($versionInfo.FileVersion); expected $env:FILE_VERSION"
          }
          if ($versionInfo.ProductVersion -ne $env:PACKAGE_VERSION) {
            throw "Unexpected Windows product version: $($versionInfo.ProductVersion); expected $env:PACKAGE_VERSION"
          }
          Get-ChildItem -LiteralPath $publish -File |
            Where-Object { $_.Extension -in @('.pdb', '.xml', '.dylib') } |
            Remove-Item -Force

      - name: Package Windows x64
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packageDirectory = Join-Path $PWD 'artifacts/package'
          $zip = Join-Path $packageDirectory 'Jampanion-Windows-x64.zip'
          New-Item -ItemType Directory -Force -Path $packageDirectory | Out-Null
          Compress-Archive -Path 'artifacts/Jampanion-win-x64/*' -DestinationPath $zip -CompressionLevel Optimal
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToUpperInvariant()
          "$hash  Jampanion-Windows-x64.zip" | Set-Content -Encoding ascii (Join-Path $packageDirectory 'Jampanion-Windows-x64.sha256')
          Get-ChildItem -LiteralPath $packageDirectory | Select-Object Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: Windows-x64-package
          path: |
            artifacts/package/Jampanion-Windows-x64.zip
            artifacts/package/Jampanion-Windows-x64.sha256

      - name: Upload package to release
        if: ${{ inputs.release_tag != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: >-
          gh release upload $env:RELEASE_TAG
          artifacts/package/Jampanion-Windows-x64.zip
          artifacts/package/Jampanion-Windows-x64.sha256
          --clobber
          --repo $env:GITHUB_REPOSITORY
